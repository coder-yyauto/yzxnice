[workspace]
name = "yzxnice"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
dev = "python main.py"

[environments]
dev = ["dev"]

[dependencies]
python = "3.12.*"
duckdb = "*"
nicegui = "*"
sqlalchemy = "*"
duckdb-engine = "*"
argon2-cffi = "*"
pillow = "*"
python-dotenv = "*"
starlette = "*"
requests = "*"

[pypi-dependencies]
pyjwt = "*"

[feature.dev.dependencies]
ruff = "*"
pyright = "*"

[feature.dev.pypi-dependencies]
pytest = "*"
playwright = "*"
httpx = "*"

[feature.dev.tasks]
test = "pytest tests/ -v"
lint = "ruff check ."
format = "ruff format ."
playwright-install = "playwright install chromium"
